<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
</head>
<body>

    <h1>Check your BMI</h1>

    <p>Enter your weight and height below to check your BMI results</p>

    <h3>Put your weight in here (KG)</h3>
    <input type="number" id="weight">

    <h3>And your height in here (CM)</h3>
    <input type="number" id="height">

    <br><br>

    <button onclick="bmiCalc()">Calculate BMI</button>

    <h2 id="result"></h2>

    <script>

        function bmiCalc() {

            const weight = Number(document.getElementById("weight").value);
            const heightCm = Number(document.getElementById("height").value);

            const heightM = heightCm / 100;

            const bmi = (weight / (heightM * heightM)).toFixed(1);

            let status = "";

            if (bmi <= 18.4) {
                status = "Underweight";
            }
            else if (bmi >= 18.5 && bmi <= 24.9) {
                status = "Normal Weight";
            }
            else if (bmi >= 25 && bmi <= 29.9) {
                status = "Overweight";
            }
            else {
                status = "Obese";
            }

            document.getElementById("result").innerText =
                `Your BMI is ${bmi} which means You are ${status}`;
        }

    </script>

</body>
</html>
